name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cli_artifact: gcs
            cli_asset: gcs-linux-x64
            gui_artifact: gcs-gui
            gui_zip: gcs-gui-linux-x64.zip
          - os: windows-latest
            cli_artifact: gcs.exe
            cli_asset: gcs-windows-x64.exe
            gui_artifact: gcs-gui.exe
            gui_zip: gcs-gui-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      # --- GTK3 Dependencies (Linux) ---
      - name: Install GTK3 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev pkg-config

      # --- Windows Setup ---
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git base-devel mingw-w64-x86_64-gcc mingw-w64-x86_64-gtk3 mingw-w64-x86_64-pkgconf

      # --- Compilation ---
      - name: Compile (Unix)
        if: runner.os != 'Windows'
        run: make

      - name: Compile (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make

      # --- Packaging Pure CLI ---
      - name: Rename CLI Artifact
        shell: bash
        run: mv ${{ matrix.cli_artifact }} ${{ matrix.cli_asset }}

      # --- Packaging GUI & Libs (Linux) ---
      - name: Bundle GUI Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/libs
          mv ${{ matrix.gui_artifact }} dist/gcs
          # Grab dynamically linked libraries, but strictly EXCLUDE core system libraries
          ldd dist/gcs | grep "=> /" | awk '{print $3}' | grep -vE "libc\.so|libm\.so|libpthread\.so|libdl\.so|librt\.so|libgcc_s\.so|libstdc\+\+\.so|ld-linux" | xargs -I '{}' cp -n '{}' dist/libs/ || true
          # Create a launcher script to tell Linux to use the local libs
          echo '#!/bin/bash' > dist/run_gcs.sh
          echo 'DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"' >> dist/run_gcs.sh
          echo 'LD_LIBRARY_PATH="$DIR/libs" "$DIR/gcs" "$@"' >> dist/run_gcs.sh
          chmod +x dist/run_gcs.sh

      # --- Packaging GUI & Libs (Windows) ---
      - name: Bundle GUI Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p dist/libs
          mv ${{ matrix.gui_artifact }} dist/gcs.exe
          # Grab all MSYS2 MinGW DLLs linked to the executable
          ldd dist/gcs.exe | grep '\/mingw.*\.dll' -o | xargs -I{} cp {} dist/libs/ || true

      # --- Create Zip Archive (Linux) ---
      - name: Zip GUI Bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          zip -r ../${{ matrix.gui_zip }} ./*

      # --- Create Zip Archive (Windows) ---
      - name: Zip GUI Bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.gui_zip }}

      # --- Uploading ---
      - name: Create Release & Upload
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.cli_asset }}
            ${{ matrix.gui_zip }}